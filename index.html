<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GERDA STÖCKEL</title>
    <link rel="icon" type="image/jpeg" href="icon.jpg">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://use.typekit.net/bzl6ezf.css">
    <link rel="preconnect" href="https://app.snipcart.com">
    <link rel="preconnect" href="https://cdn.snipcart.com">
    <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.4.1/default/snipcart.css" />
</head>
<body>
    <div id="mobile-blocker">
        <div class="blocker-content">
            <div class="loader"></div>
            <p>website only available on desktop</p>
        </div>
    </div>

    <div id="loading-screen">
        <video id="web-trailer" autoplay muted playsinline>
            <source src="GEST01_WebTrailer.mp4" type="video/mp4">
        </video>
        <div class="loader-text">LOADING ARCHIVE...</div>
    </div>

    <div class="site-wrapper">
        <main class="visual-zone scroll-container">
            <div id="visual-grid" class="piece-database"></div>
        </main>

        <section class="info-zone">
            <div class="info-scroll-wrapper">
                <div id="info-grid" class="view-state active"></div>
            </div>

            <div id="overlay-curtain">
                <div id="overlay-content"></div>
            </div>
        </section>

        <aside class="side-header">
            <header>
                <img class="brand-logo" src="/GS_white_black.png" alt="GS Logo">
                <nav class="main-nav">
                    <ul id="nav-list"></ul>
                </nav>
            </header>
        </aside>
    </div>

    <template id="visual-template">
        <div class="piece-unit">
            <span class="piece-id"></span>
            <img class="piece-img" src="" alt="" loading="lazy">
        </div>
    </template>

    <template id="info-template">
        <div class="piece-unit">
            <div class="piece-header">
                <span class="p-id-name"></span>
                <span class="p-price"></span>
            </div>
            <div class="p-measurements"></div>
            <div class="piece-footer">
                <span class="p-size"></span>
                <button class="snipcart-add-item add-btn">ADD TO CART</button>
            </div>
        </div>
    </template>
    <div hidden id="snipcart" 
        data-api-key="MDRkNjBkZjMtMzk0OC00MGMyLWE2ZDYtMTFjY2Q4Y2UzYWI0NjM5MDcxOTc1NDQxNzY4MTYy" 
        data-config-add-product-behavior="none">
    </div>    

    <script async src="https://cdn.snipcart.com/themes/v3.4.1/default/snipcart.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
